<!-- chat/templates/chat/room.html -->
<!doctype html>
<html>
  <head>
    <title>Room: {{ room_name }}</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .chat-box {
        width: 420px;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        height: 560px;
      }

      /* Header */
      .header {
        background: #075e54;
        color: white;
        padding: 14px 18px;
        font-size: 16px;
        font-weight: bold;
      }
      .header span {
        font-size: 12px;
        color: #aedba7;
        display: block;
        margin-top: 2px;
      }

      /* Name input bar */
      .name-bar {
        padding: 8px 12px;
        background: #f8f8f8;
        border-bottom: 1px solid #eee;
      }
      .name-bar input {
        width: 100%;
        padding: 6px 10px;
        border: 1px solid #ddd;
        border-radius: 16px;
        font-size: 13px;
        outline: none;
      }

      /* Messages area */
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 14px;
        background: #e5ddd5;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      /* Each message bubble */
      .message {
        max-width: 75%;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 14px;
        line-height: 1.4;
      }
      /* Messages from others — left side */
      .message.received {
        background: white;
        align-self: flex-start;
        border-radius: 0 8px 8px 8px;
      }
      /* Messages from me — right side, green */
      .message.sent {
        background: #dcf8c6;
        align-self: flex-end;
        border-radius: 8px 0 8px 8px;
      }
      .message .name {
        font-size: 11px;
        font-weight: bold;
        color: #075e54;
        margin-bottom: 3px;
      }
      /* Right-align the name for messages sent by me */
      .message.sent .name {
        text-align: right;
        color: #075e54;
      }

      /* Input area */
      .input-area {
        padding: 10px 12px;
        background: #f0f0f0;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .input-area input {
        flex: 1;
        padding: 9px 14px;
        border: none;
        border-radius: 22px;
        background: white;
        font-size: 14px;
        outline: none;
      }
      .input-area button {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        background: #25d366;
        color: white;
        font-size: 18px;
        cursor: pointer;
      }

      /* Status bar */
      #status {
        text-align: center;
        padding: 5px;
        font-size: 12px;
        color: #aaa;
      }
      #status.connected {
        color: #25d366;
      }
      #status.disconnected {
        color: #e55;
      }
    </style>
  </head>
  <body>
    <div class="chat-box">
      <!-- Header shows room name -->
      <div class="header">
        💬 {{ room_name }}
        <span>Django Channels WebSocket</span>
      </div>

      <!-- User types their name here -->
      <div class="name-bar">
        <input
          type="text"
          id="senderName"
          placeholder="Your name (e.g. Ali, Sara...)"
        />
      </div>

      <!-- Status -->
      <div id="status">Connecting...</div>

      <!-- Messages appear here -->
      <div class="messages" id="messages"></div>

      <!-- Type and send -->
      <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message..." />
        <button onclick="sendMessage()">➤</button>
      </div>
    </div>

    <script>
      // ─────────────────────────────────────
      // Get room name from Django template
      // {{ room_name }} becomes "friends"
      // ─────────────────────────────────────
      const roomName = "{{ room_name }}";

      // ─────────────────────────────────────
      // Connect to WebSocket
      // This triggers connect() in consumers.py
      // ─────────────────────────────────────
      const socket = new WebSocket(
        `ws://${window.location.host}/ws/chat/${roomName}/`,
      );

      // ─────────────────────────────────────
      // WebSocket connected successfully
      // ─────────────────────────────────────
      socket.onopen = function () {
        const status = document.getElementById("status");
        status.textContent = "● Connected";
        status.className = "connected";
      };

      // ─────────────────────────────────────
      // WebSocket disconnected
      // ─────────────────────────────────────
      socket.onclose = function () {
        const status = document.getElementById("status");
        status.textContent = "● Disconnected";
        status.className = "disconnected";
      };

      // ─────────────────────────────────────
      // Message received from server
      // This fires when chat_message() runs
      // ─────────────────────────────────────
      socket.onmessage = function (event) {
        // event.data = '{"message": "Hello!", "sender": "Ali"}'
        const data = JSON.parse(event.data);

        // Normalize names and compare case-insensitively
        const myName = (
          document.getElementById("senderName").value.trim() || "Anonymous"
        ).toLowerCase();

        // Create message bubble
        const div = document.createElement("div");

        // If I sent it → green right side (show name right-aligned)
        // If someone else sent it → white left side
        if ((data.sender || "").trim().toLowerCase() === myName) {
          div.className = "message sent";
          div.innerHTML = `
                <div class="name">${data.sender}</div>
                <div>${data.message}</div>
            `;
        } else {
          div.className = "message received";
          div.innerHTML = `
                <div class="name">${data.sender}</div>
                <div>${data.message}</div>
            `;
        }

        const messages = document.getElementById("messages");
        messages.appendChild(div);

        // Auto scroll to latest message
        messages.scrollTop = messages.scrollHeight;
      };

      // ─────────────────────────────────────
      // Send message to server
      // This triggers receive() in consumers.py
      // ─────────────────────────────────────
      function sendMessage() {
        const messageInput = document.getElementById("messageInput");
        const senderName = document.getElementById("senderName");

        const message = messageInput.value.trim();
        const sender = senderName.value.trim() || "Anonymous";

        if (message === "") return;

        // Send as JSON string to server
        // consumers.py receive() will get this
        socket.send(
          JSON.stringify({
            message: message,
            sender: sender,
          }),
        );

        // Clear input field
        messageInput.value = "";
      }

      // Send on Enter key
      document
        .getElementById("messageInput")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") sendMessage();
        });
    </script>
  </body>
</html>
